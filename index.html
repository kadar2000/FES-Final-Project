<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Treact</title>
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://kit.fontawesome.com/45326c82e0.js"
      crossorigin="anonymous"
    ></script>
    <script src="index.js"></script>
  </head>
  <body>
    <section id="landing">
      <nav>
        <div class="row nav__row">
          <div class="nav__logo">
            <img
              class="logo"
              src="./assets/logo.2c489fc453a1783cbadacf914efa3df6.svg"
              alt="logo"
            />
            <a href="#" class="logo__title">Treact</a>
          </div>
          <ul class="nav__links">
            <li><a href="#" class="nav__link">About</a></li>
            <li><a href="#" class="nav__link">Blog</a></li>
            <li><a href="#" class="nav__link">Pricing</a></li>
            <li><a href="#" class="nav__link">Contact Us</a></li>
            <li>
              <a href="#" class="nav__link nav__link--secondary">Login</a>
            </li>
            <li>
              <a href="#" class="nav__link nav__link--primary">Sign Up</a>
            </li>
          </ul>
          <button class="btn__menu" onclick="openMenu()">
            <i class="fas fa-bars"></i>
          </button>
        </div>
      </nav>
      <div class="menu__backdrop">
        <button class="btn__menu btn__menu--close" onclick="closeMenu()">
          <i class="fas fa-times"></i>
        </button>
        <div class="menu__links">
          <a class="menu__link">About</a>
          <a class="menu__link">Blog</a>
          <a class="menu__link">Pricing</a>
          <a class="menu__link">Contact Us</a>
          <a class="menu__link">Login</a>
          <a class="menu__link menu__link--primary">Sign Up</a>
        </div>
      </div>

</html>
